<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="#0f172a" />
  
  <!-- Subtle grid pattern -->
  <path d="M0 128h512M0 256h512M0 384h512M128 0v512M256 0v512M384 0v512" stroke="#1e293b" stroke-width="2" />
  
  <!-- Glow effect behind the C -->
  <circle cx="256" cy="256" r="160" fill="#3b82f6" opacity="0.2" filter="blur(40px)" />
  <circle cx="256" cy="256" r="100" fill="#8b5cf6" opacity="0.3" filter="blur(30px)" />
  
  <!-- The Letter C constructed from blocks/pixels -->
  <g transform="translate(140, 116)">
    <!-- Top curve -->
    <rect x="70" y="0" width="120" height="40" rx="8" fill="url(#gradient-1)" />
    <rect x="30" y="30" width="50" height="40" rx="8" fill="url(#gradient-1)" />
    <rect x="180" y="30" width="50" height="40" rx="8" fill="url(#gradient-1)" />
    
    <!-- Left vertical -->
    <rect x="0" y="60" width="40" height="160" rx="8" fill="url(#gradient-2)" />
    
    <!-- Bottom curve -->
    <rect x="30" y="210" width="50" height="40" rx="8" fill="url(#gradient-3)" />
    <rect x="180" y="210" width="50" height="40" rx="8" fill="url(#gradient-3)" />
    <rect x="70" y="240" width="120" height="40" rx="8" fill="url(#gradient-3)" />
    
    <!-- Code bracket elements (tech feel) -->
    <path d="M130 90 L90 140 L130 190" fill="none" stroke="#60a5fa" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
  </g>
  
  <!-- Decorative pixels/dots -->
  <rect x="360" y="160" width="20" height="20" rx="4" fill="#38bdf8" />
  <rect x="390" y="246" width="20" height="20" rx="4" fill="#818cf8" />
  <rect x="340" y="330" width="20" height="20" rx="4" fill="#a78bfa" />
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="gradient-1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
    <linearGradient id="gradient-2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>
    <linearGradient id="gradient-3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>
  </defs>
</svg>